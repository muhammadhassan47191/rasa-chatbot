<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot - Voice Interface</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    width: 100%;
    height: 100vh;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.chat-container {
    width: 100%;
    height: 100%;
    background: url('assets/images/3_page_background.jpg') center/cover no-repeat;
    display: flex;
}

/* ================= HEADER ================= */
.header {
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(139,105,90,0.95);
    color: white;
    padding: 12px 40px;
    border-radius: 30px;
    z-index: 100;
}

.header h1 {
    font-size: clamp(18px, 2vw, 32px);
    font-weight: bold;
}

/* ================= LEFT PANEL ================= */
.chatbot-panel {
    width: 45%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 120px 20px 40px;
    gap: 40px;
}

.bot-card {
    background: rgba(255,255,255,0.95);
    border-radius: 30px;
    padding: 40px;
    width: 90%;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 25px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}

.bot-avatar-container {
    width: 60%;
    max-width: 280px;
    aspect-ratio: 1/1;
    border-radius: 50%;
    overflow: hidden;
}

.bot-avatar {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.bot-status h2 {
    font-size: clamp(18px, 2vw, 30px);
    font-weight: bold;
}

/* Buttons */
.control-buttons {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
}

.control-btn {
    padding: 15px 35px;
    font-size: clamp(14px, 1.2vw, 20px);
    border: none;
    border-radius: 25px;
    cursor: pointer;
    font-weight: bold;
    color: white;
    transition: 0.3s;
}

.control-btn:active {
    transform: scale(0.95);
}

#btn-en {
    background: #007bff;
}

#btn-ur {
    background: #28a745;
    font-family: 'Noto Nastaliq Urdu', serif;
}

.recording {
    background: #dc3545 !important;
}

/* ================= RIGHT PANEL ================= */
.conversation-panel {
    width: 55%;
    background: rgba(230,230,230,0.95);
    padding: 120px 40px 40px;
    display: flex;
    flex-direction: column;
}

.conversation-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.message {
    padding: 15px 20px;
    border-radius: 18px;
    max-width: 75%;
    font-size: clamp(14px, 1.1vw, 18px);
    line-height: 1.4;
}

.user {
    background: #8b695a;
    color: white;
    align-self: flex-end;
}

.bot {
    background: white;
    color: black;
    align-self: flex-start;
}

.empty-state {
    text-align: center;
    margin-top: 50px;
    font-size: clamp(16px, 1.3vw, 20px);
    color: #777;
}
</style>
</head>

<body>

<div class="chat-container">

<div class="header">
    <h1>COMMUNICATE WITH AI CHATBOT</h1>
</div>

<!-- LEFT -->
<div class="chatbot-panel">

    <div class="bot-card">
        <div class="bot-avatar-container">
            <img src="E:\python\rasaProject\ChatGPT Image Feb 22, 2026, 12_25_18 AM.png" class="bot-avatar">
        </div>
        <div class="bot-status">
            <h2 id="status">Ready</h2>
        </div>
    </div>

    <div class="control-buttons">
        <button id="btn-en" class="control-btn">Speak English</button>
        <button id="btn-ur" class="control-btn">اردو بولے</button>
    </div>

</div>

<!-- RIGHT -->
<div class="conversation-panel">
    <div class="conversation-list" id="conversationList">
        <div class="empty-state">Start speaking to begin conversation...</div>
    </div>
</div>

</div>

<script>
let mediaRecorder;
let audioChunks = [];
let currentLang = "en";

const statusDiv = document.getElementById("status");
const btnEn = document.getElementById("btn-en");
const btnUr = document.getElementById("btn-ur");
const conversationList = document.getElementById("conversationList");

// Initialize microphone
async function initAudio() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);

        mediaRecorder.ondataavailable = e => {
            audioChunks.push(e.data);
        };

        mediaRecorder.onstop = async () => {
            const blob = new Blob(audioChunks, { type: "audio/wav" });
            audioChunks = [];
            sendAudio(blob);
        };
    } catch (err) {
        alert("Microphone access denied or unavailable.");
        console.error(err);
    }
}

initAudio();

// Button Logic (Same as your working page)
btnEn.onmousedown = () => startRecording("en", btnEn);
btnUr.onmousedown = () => startRecording("ur", btnUr);

btnEn.onmouseup = stopRecording;
btnUr.onmouseup = stopRecording;

btnEn.onmouseleave = stopRecording;
btnUr.onmouseleave = stopRecording;

function startRecording(lang, btn) {
    if (!mediaRecorder || mediaRecorder.state === "recording") return;

    currentLang = lang;
    audioChunks = [];
    mediaRecorder.start();

    statusDiv.textContent = lang === "en" ? "Listening (English)..." : "سن رہا ہوں...";
    btn.classList.add("recording");
}

function stopRecording() {
    if (!mediaRecorder || mediaRecorder.state !== "recording") return;

    mediaRecorder.stop();
    statusDiv.textContent = "Processing...";
    btnEn.classList.remove("recording");
    btnUr.classList.remove("recording");
}

async function sendAudio(audioBlob) {
    const formData = new FormData();
    formData.append("audio", audioBlob, "recording.wav");
    formData.append("language", currentLang);

    try {
        const response = await fetch("http://rasa-chatbot-production-c53e.up.railway.app/process_audio", {
            method: "POST",
            body: formData
        });

        if (!response.ok) throw new Error("Server Error");

        const data = await response.json();

        addMessage("user", data.user_text);
        addMessage("bot", data.bot_text);

        playAudio(data.audio_base64);

    } catch (error) {
        console.error(error);
        statusDiv.textContent = "Error processing request.";
    }
}

function playAudio(base64Audio) {
    statusDiv.textContent = "Speaking...";
    const audio = new Audio("data:audio/mp3;base64," + base64Audio);
    audio.onended = () => statusDiv.textContent = "Ready";
    audio.play();
}

function addMessage(role, text) {
    const empty = document.querySelector(".empty-state");
    if (empty) empty.remove();

    const div = document.createElement("div");
    div.className = "message " + role;
    div.textContent = text;

    conversationList.appendChild(div);
    conversationList.scrollTop = conversationList.scrollHeight;
}
</script>

</body>
</html>
